<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>User Registration Form</title>
    </head>
    <body>
        <form action="#" method="post">

        <header>
        <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="2" fill="blue" />
        </svg>
        <h1>User Registration</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        </header>

        <main>
            <section>
                <h2>Registration Form</h2>
            <div>
                <label>이름</label>
                <input type="text" name="username" placeholder="Username" required><!--required는 필수 입력 항목으로 만드는 속성-->
            </div>

            <div>
                <label>이메일</label>
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div>
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div>
                <label>생년월일</label>
            <input type="date" name="birthdate" placeholder="Birthdate">
            </div>

            <div>
                <label>나이</label>
            <input type="number" name="age" placeholder="Age" min="18" max="100">
            </div>

            <div>
                <label>서비스 만족도</label>
            <input type="range" name="rating" min="1" max="10" value="5"><!--value="5"작성 시 5에서 시작-->
            </div>

            <div>
                <label>성별</label>
            <input id="gender_male" type="radio" name="gender" value="male"> <label for="gender_male"> Male</label>
            <input id="gender_female" type="radio" name="gender" value="female"> <label for="gender_female"> Female</label><!--선택자를 이용한 label태그 부여-->
            <input id="gender_other" type="radio" name="gender" value="other"> <label for="gender_other"> Other</label>
            </div>

            <div>
                <label>취미</label>
            <input id="hobby_sports" type="checkbox" name="hobby" value="sports"> <label for="hobby_sports"> 운동</label>
            <input id="hobby_reading" type="checkbox" name="hobby" value="reading"> <label for="hobby_reading"> 독서</label>
            <input id="hobby_gaming" type="checkbox" name="hobby" value="gaming"> <label for="hobby_gaming"> 게임</label>
            </div>

            <div>
                <label>국가</label>
            <select name="country">
                <option value="kr">South Korea</option>
                <option value="us">United States</option>
                <option value="jp">Japan</option>
                <option value="cn">China</option>
                <option value="uk">United Kingdom</option>
            </select>
            </div>

            <div>
            <button type="submit">제출</button>
            <button type="reset">초기화</button>
            <!--각 입력 요소에 label 태그 입력, p 와 div 태그 사용하여 가독성 높이기-->
            </div>
            </section>
            
        <article>
            <canvas id="myCanvas" width="200" height="100" style="border:1px solid black;">
            </canvas><!--캔버스 의도 작성-->
            <h3>Why Register?[article]</h3>
            <p>Registering allows you to access exclusive features...[article]</p>
        </article>
        </main>
        </form>

        <aside>
            <video controls width="300" height="200">
                <source src="./media/sample.mp4" type="video/mp4">
                <source src="./media/sample.webm" type="video/webm">
                Your browser does not support the video tag.
            </video>
            <h3>Registration Tips[aside]</h3>
            <p>Contact Support[aside]</p>
        </aside>

        <footer>
            <p>&copy; 2025 Your Website</p>
        </footer>

    </body>
</html>
