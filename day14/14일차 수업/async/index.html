<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Fetch 실습</title>
  </head>
  <body>
    <h1>Fetch API 실습</h1>
    <button onclick="getPost()">게시물 가져오기</button>
    <button onclick="createPost()">게시물 생성</button>
    <div id="result"></div>
    <script>
      async function getPost() {
        try {
          let response = await fetch(
            "https://jsonplaceholder.typicode.com/posts/1",
          );
          let data = await response.json();
          console.log(data);
          document.getElementById("result").textContent = data.title;
        } catch (error) {
          document.getElementById("result").textContent =
            "에러: " + error.message;
        }
      }
      async function createPost() {
        try {
          let response = await fetch(
            "https://jsonplaceholder.typicode.com/posts",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                title: "새 게시물",
                body: "내용",
                userId: 1,
              }),
            },
          );
          let data = await response.json();
          console.log("생성된 게시물:", data);
        } catch (error) {
          console.log("에러:", error);
        }
      }
      createPost();
    </script>

    <input id="search" placeholder="게시물 ID 입력" />
    <button onclick="searchPost()">검색</button>
    <div id="output"></div>
    <script>
      async function searchPost() {
        try {
          let id = document.getElementById("search").value;
          let response = await fetch(
            `https://jsonplaceholder.typicode.com/posts/${id}`,
          );
          let post = await response.json();
          document.getElementById("output").innerHTML = `<p>${post.title}</p>`;
        } catch (error) {
          document.getElementById("output").innerHTML =
            `<p>에러: ${error.message}</p>`;
        }
      }
    </script>
  </body>
</html>
