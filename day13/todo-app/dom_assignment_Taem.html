<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>할 일 목록 앱</title>
    <style>
      .container {
        max-width: 600px;
        margin: 20px auto;
        font-family: Arial, sans-serif;
      }
      .task-item {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        border-bottom: 1px solid #ccc;
        cursor: pointer;
      }
      .completed {
        text-decoration: line-through;
        color: #888;
      }
      .delete-button {
        background-color: #ff4444;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
      }
      .delete-button:hover {
        background-color: #cc0000;
      }
      .high {
        color: red;
      }
      input,
      button {
        padding: 8px;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>할 일 목록</h1>
      <div>
        <input type="text" id="taskInput" placeholder="할 일을 입력하세요" />
        <select id="priority">
          <option value="low">낮음</option>
          <option value="high">높음</option>
        </select>
        <button id="addButton" onclick="addTask()">추가</button>
        <button id="clearButton">전체 삭제</button>
      </div>
      <div id="taskCount">현재 할 일: <span>0</span>개</div>
      <ul id="taskList"></ul>
    </div>
    <script>
// 과제:
// HTML 파일에 연결하여 브라우저에서 실행하세요

// DOM 요소 선택
const taskInput = document.getElementById("taskInput");
const addButton = document.getElementById("addButton");
const taskList = document.getElementById("taskList");
const clearButton = document.getElementById("clearButton");
const taskCount = document.querySelector("#taskCount span");
const prioritySelect = document.getElementById("priority");
let taskCounter = 0;

// // 할 일 개수 업데이트 함수
function updateTaskCount(count) {
  taskCount.textContent = count;
  //   const count = taskList.children.length;
  //   taskCount.textContent = count;
}

// 입력값 검증 및 할 일 추가 함수
function addTask() {
  const taskText = taskInput.value.trim();
  console.log(taskText);

  // 입력값이 비어있는지 확인
  if (taskText === "") {
    alert("할 일을 입력하세요!");
  }

  // 새로운 리스트 아이템 생성
  const listItem = document.createElement("li");
  listItem.classList.add("task-item");
  listItem.classList.add(prioritySelect.value); // 우선순위 클래스 추가

  // 할 일 텍스트 추가
  listItem.textContent = taskText;

  // 삭제 버튼 생성
  const deleteButton = document.createElement("button");
  deleteButton.textContent = "삭제";
  deleteButton.classList.add("delete-button");

  // 삭제 버튼 이벤트 리스너
  deleteButton.addEventListener("click", function () {
    taskList.removeChild(listItem);
    //   updateTaskCount();
    taskCounter = taskCounter - 1;
    updateTaskCount(taskCounter);
  });

  // 완료 상태 토글 이벤트 리스너
  listItem.addEventListener("click", function () {
    listItem.classList.toggle("completed");
  });

  // 요소 조립
  listItem.appendChild(deleteButton);
  taskList.appendChild(listItem);

  // 입력창 초기화
  taskInput.value = "";

  // 할 일 개수 업데이트
  //   updateTaskCount();
  taskCounter = taskCounter + 1;
  updateTaskCount(taskCounter);
}

// 모든 할 일 삭제 함수
function clearAllTasks() {
  taskList.innerHTML = "";
  //   updateTaskCount();
  taskCounter = 0;
  updateTaskCount(taskCounter);
}

// 입력창에서 Enter 키 이벤트 적용 (event.key === 'Enter')
taskInput.addEventListener("keypress", function (event) {
  if (event.key === "Enter") addTask();
});

// 전체 삭제 버튼 클릭 이벤트 적용
clearButton.onclick = clearAllTasks;
    </script>
  </body>
</html>
