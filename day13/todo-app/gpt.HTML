
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>할 일 목록 앱</title>
    <style>
        .container {
            max-width: 600px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .completed {
            text-decoration: line-through;
            color: #888;
        }
        .delete-button {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .delete-button:hover {
            background-color: #cc0000;
        }
        input, button {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>할 일 목록</h1>
        <div>
            <input type="text" id="taskInput" placeholder="할 일을 입력하세요">
            <button id="addButton">추가</button>
            <button id="clearButton">전체 삭제</button>
        </div>
        <ul id="taskList"></ul>
    </div>
    <script>
        // 1. 도구(DOM 요소)들 가져오기
const taskInput = document.getElementById('taskInput');
const addButton = document.getElementById('addButton');
const taskList = document.getElementById('taskList');
const clearButton = document.getElementById('clearButton');

// 2. 할 일 추가 함수
function addTask() {
    // 입력창에 쓴 글자 가져오기 (양쪽 공백 제거)
    const taskText = taskInput.value.trim();

    // [입력값 검증] 비어있으면 경고창 띄우고 끝내기
    if (taskText === "") {
        alert('할 일을 입력해주세요!');
        return; // 여기서 함수 종료
    }

    // [새로운 리스트 아이템 생성] <li> 상자 만들기
    const li = document.createElement('li');
    li.className = 'task-item'; // CSS 꾸미기용 이름표 붙이기

    // [할 일 텍스트 추가] <span> 태그에 글자 넣기
    const span = document.createElement('span');
    span.textContent = taskText;
    
    // [완료 상태 토글] 글자 클릭하면 밑줄 긋기
    span.addEventListener('click', function() {
        span.classList.toggle('completed');
    });

    // [삭제 버튼 생성]
    const delBtn = document.createElement('button');
    delBtn.textContent = '삭제';
    delBtn.className = 'delete-button';

    // [삭제 버튼 클릭 이벤트] 누르면 이 리스트(li) 삭제
    delBtn.addEventListener('click', function() {
        taskList.removeChild(li);
    });

    // [요소 조립] li 안에 글자(span)랑 버튼(delBtn) 넣기
    li.appendChild(span);
    li.appendChild(delBtn);

    // [목록에 추가] 완성된 li를 진짜 목록(ul)에 넣기
    taskList.appendChild(li);

    // [입력창 초기화] 다음 입력을 위해 비우기
    taskInput.value = "";
    taskInput.focus(); // 마우스 커서 다시 입력창으로 보내기
}

// 3. 모든 할 일 삭제 함수
function clearAllTasks() {
    // 바구니(taskList) 안을 싹 비우기
    taskList.innerHTML = "";
}

// 4. 이벤트 연결 (사용자가 행동할 때 실행될 함수 지정)

// 추가 버튼 클릭했을 때
addButton.addEventListener('click', addTask);

// 입력창에서 Enter 키 눌렀을 때
taskInput.addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        addTask();
    }
});

// 전체 삭제 버튼 클릭했을 때
clearButton.addEventListener('click', clearAllTasks);
    </script>
</body>
</html>
